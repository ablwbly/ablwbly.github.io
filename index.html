<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <style>
    :root {
      --bg: #f4f8f6;
      --paper: rgba(255, 255, 255, 0.84);
      --ink: #33413f;
      --muted: #6d827d;
      --line: rgba(119, 154, 146, 0.22);
      --accent: #9bbab4;
      --accent-deep: #6f948d;
      --shadow: 0 20px 44px rgba(96, 122, 116, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(155, 186, 180, 0.22), transparent 30%),
        radial-gradient(circle at 85% 15%, rgba(191, 214, 208, 0.2), transparent 25%),
        linear-gradient(180deg, #f7fbf9 0%, #eff5f3 100%);
    }

    .card {
      width: min(760px, calc(100% - 32px));
      padding: 44px;
      border-radius: 32px;
      border: 1px solid var(--line);
      background: var(--paper);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(155, 186, 180, 0.16);
      color: var(--accent-deep);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.82rem;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(2.8rem, 8vw, 5.4rem);
      font-weight: 600;
      line-height: 0.96;
    }

    p {
      margin: 0 auto;
      max-width: 34rem;
      color: var(--muted);
      line-height: 1.9;
      font-size: 1.02rem;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 34px;
      padding: 18px 34px;
      min-width: 260px;
      border-radius: 999px;
      text-decoration: none;
      background: var(--accent-deep);
      color: #fff;
      font-size: 1rem;
      letter-spacing: 0.04em;
      box-shadow: 0 16px 34px rgba(111, 148, 141, 0.22);
    }

    @media (max-width: 640px) {
      .card {
        padding: 30px 22px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="eyebrow">Portfolio</span>
    <h1>Ziyi Ren</h1>
    <p>
      A concise portfolio homepage with a calm celadon palette. This landing page stays intentionally simple:
      just a name, a short introduction, and a direct path into the project directory.
    </p>
    <a class="button" href="projects.html">Enter Project Directory</a>
  </main>
</body>
</html>
