<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whiskas</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap');

    :root {
      --bg: #f0efeb;
      --paper: rgba(249, 246, 240, 0.94);
      --panel: #f7f3ed;
      --ink: #312b25;
      --muted: #74695c;
      --line: rgba(116, 105, 92, 0.18);
      --accent: #8d7662;
      --accent-soft: rgba(141, 118, 98, 0.12);
      --shadow: 0 18px 36px rgba(77, 64, 52, 0.08);
      --stage: #ebe4da;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(170, 152, 131, 0.12), transparent 26%),
        linear-gradient(180deg, #f6f3ed 0%, var(--bg) 100%);
    }

    .page {
      width: min(1080px, calc(100% - 40px));
      margin: 0 auto;
      padding: 24px 0 64px;
      opacity: 0;
      transform: translateY(14px);
      animation: page-fade-in 0.55s ease forwards;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 36px;
    }

    .brand,
    .menu a {
      color: var(--muted);
      text-decoration: none;
      font-size: 1.08rem;
    }

    .menu {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .intro {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
      gap: 36px;
      margin-bottom: 36px;
      align-items: center;
    }

    .card,
    .meta-block,
    .figure {
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .card {
      padding: 0;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.6rem, 6.8vw, 5.8rem);
      line-height: 0.93;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.22rem;
      line-height: 1.72;
    }

    .meta {
      display: grid;
      gap: 14px;
    }

    .meta-block {
      padding: 0;
      background: transparent;
    }

    .meta-block strong {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
      font-size: 1.22rem;
      font-weight: 600;
    }

    .meta-block span {
      display: block;
      color: var(--muted);
      font-size: 1.14rem;
      line-height: 1.68;
    }

    .campaign-note {
      margin-top: 26px;
      text-align: center;
      max-width: 28rem;
    }

    .campaign-note p {
      color: var(--ink);
      font-size: 1.28rem;
      line-height: 1.24;
    }

    .campaign-note em {
      display: block;
      color: var(--ink);
      font-size: 1.12rem;
      font-style: italic;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
      align-items: start;
    }

    .figure {
      overflow: visible;
    }

    .figure.full-width {
      grid-column: 1 / -1;
    }

    .visual-stage {
      display: grid;
      place-items: center;
      min-height: 0;
      padding: 0;
      background: transparent;
    }

    .visual-stage img {
      max-width: 100%;
      max-height: 520px;
      width: auto;
      height: auto;
      display: block;
      object-fit: contain;
      border-radius: 0;
    }

    .visual-stage.wide {
      min-height: 0;
      padding: 0;
    }

    .visual-stage.wide img {
      max-height: none;
      width: 100%;
      height: auto;
      object-fit: contain;
      border-radius: 0;
    }

    .caption {
      padding: 16px 0 8px;
      background: transparent;
    }

    .caption p {
      font-size: 1.04rem;
      line-height: 1.58;
    }

    @media (max-width: 900px) {
      .page { width: min(1080px, calc(100% - 28px)); }
      .nav { flex-direction: column; align-items: flex-start; }
      .intro { grid-template-columns: 1fr; }
      .card {
        min-height: 0;
        align-items: flex-start;
        text-align: left;
      }
      .campaign-note { text-align: left; }
      .gallery { grid-template-columns: 1fr; }
      .figure.full-width { grid-column: auto; }
      .visual-stage {
        min-height: 0;
        padding: 0;
      }
      .visual-stage img {
        max-height: 420px;
      }
    }

    @keyframes page-fade-in {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="nav">
      <a class="brand" href="index.html">Ziyi Ren</a>
      <nav class="menu" aria-label="Main">
        <a href="index.html">Home</a>
        <a href="projects.html">Project Directory</a>
      </nav>
    </header>

    <section class="intro">
      <article class="card">
        <h1>WHISKAS</h1>
        <div class="campaign-note">
          <p>tommie's purfect day</p>
          <em>visuals- OOH</em>
        </div>
      </article>

      <aside class="meta">
        <div class="meta-block">
          <strong>We Want To Tell</strong>
          <span>Young cat parents who doubt Whiskas after seeing negative posts online</span>
        </div>
        <div class="meta-block">
          <strong>That</strong>
          <span>Whiskas is quality food that cats thrive on</span>
        </div>
        <div class="meta-block">
          <strong>Because</strong>
          <span>Nothing proves cat food quality better than happy, thriving cats.</span>
        </div>
      </aside>
    </section>

    <section class="gallery">
      <figure class="figure">
        <div class="visual-stage">
          <img src="src/whiskas/whiskas1.png" alt="Whiskas visual 1">
        </div>
        <figcaption class="caption">
          <p>Reaching the top is just an ego boost.</p>
        </figcaption>
      </figure>

      <figure class="figure">
        <div class="visual-stage">
          <img src="src/whiskas/whiskas2.jpg" alt="Whiskas visual 2">
        </div>
        <figcaption class="caption">
          <p>They should change the name to downward cat.</p>
        </figcaption>
      </figure>

      <figure class="figure">
        <div class="visual-stage">
          <img src="src/whiskas/whiskas3.jpg" alt="Whiskas visual 3">
        </div>
        <figcaption class="caption">
          <p>Zoomies count as cardio.</p>
        </figcaption>
      </figure>

      <figure class="figure">
        <div class="visual-stage">
          <img src="src/whiskas/whiskas4.jpg" alt="Whiskas visual 4">
        </div>
        <figcaption class="caption">
          <p>Main character energy, every single day.</p>
        </figcaption>
      </figure>

      <figure class="figure">
        <div class="visual-stage">
          <img src="src/whiskas/whiskas5.jpg" alt="Whiskas visual 5">
        </div>
        <figcaption class="caption">
          <p>No schedule. Just vibes and dinner.</p>
        </figcaption>
      </figure>

      <figure class="figure">
        <div class="visual-stage">
          <img src="src/whiskas/whiskas6.jpg" alt="Whiskas visual 6">
        </div>
        <figcaption class="caption">
          <p>Luxury is acting like the bowl was never full enough.</p>
        </figcaption>
      </figure>

      <figure class="figure">
        <div class="visual-stage">
          <img src="src/whiskas/ChatGPT%20Image%202026%E5%B9%B43%E6%9C%8818%E6%97%A5%2017_15_19.png" alt="Whiskas concept visual 7">
        </div>
        <figcaption class="caption">
          <p>Curiosity is a full-time job.</p>
        </figcaption>
      </figure>

      <figure class="figure">
        <div class="visual-stage">
          <img src="src/whiskas/ChatGPT%20Image%202026%E5%B9%B43%E6%9C%8818%E6%97%A5%2017_47_38.png" alt="Whiskas concept visual 8">
        </div>
        <figcaption class="caption">
          <p>Every room is a stage if you are dramatic enough.</p>
        </figcaption>
      </figure>

      <figure class="figure">
        <div class="visual-stage">
          <img src="src/whiskas/ChatGPT%20Image%202026%E5%B9%B43%E6%9C%8818%E6%97%A5%2017_51_15.png" alt="Whiskas concept visual 9">
        </div>
        <figcaption class="caption">
          <p>Rest is productive when you are this cute.</p>
        </figcaption>
      </figure>

      <figure class="figure">
        <div class="visual-stage">
          <img src="src/whiskas/ChatGPT%20Image%202026%E5%B9%B43%E6%9C%8818%E6%97%A5%2017_58_28.png" alt="Whiskas concept visual 10">
        </div>
        <figcaption class="caption">
          <p>Swipe for opinions nobody asked for.</p>
        </figcaption>
      </figure>

      <figure class="figure full-width">
        <div class="visual-stage wide">
          <img src="src/whiskas/Instagram%20story%20mockup.png" alt="Whiskas story mockup">
        </div>
        <figcaption class="caption">
          <p>Snack polls, side-eyes, and story-time chaos.</p>
        </figcaption>
      </figure>

      <figure class="figure full-width">
        <div class="visual-stage wide">
          <img src="src/whiskas/Frame%209.png" alt="Whiskas story sequence">
        </div>
        <figcaption class="caption">
          <p>A story sequence built for cat behavior and snack-time drama.</p>
        </figcaption>
      </figure>
    </section>
  </main>

  <script>
    window.addEventListener('pageshow', () => {
      const page = document.querySelector('.page');
      page.style.animation = 'none';
      page.style.opacity = '1';
      page.style.transform = 'translateY(0)';
    });
  </script>
</body>
</html>
