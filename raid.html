<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAID</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap');

    :root {
      --bg: #f0efeb;
      --paper: rgba(249, 246, 240, 0.94);
      --panel: #f7f3ed;
      --ink: #312b25;
      --muted: #74695c;
      --line: rgba(116, 105, 92, 0.18);
      --accent: #8d7662;
      --accent-soft: rgba(141, 118, 98, 0.12);
      --shadow: 0 18px 36px rgba(77, 64, 52, 0.08);
      --stage: #ebe4da;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(170, 152, 131, 0.12), transparent 26%),
        linear-gradient(180deg, #f6f3ed 0%, var(--bg) 100%);
    }

    .page {
      width: min(1080px, calc(100% - 40px));
      margin: 0 auto;
      padding: 24px 0 64px;
      opacity: 0;
      transform: translateY(14px);
      animation: page-fade-in 0.55s ease forwards;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 36px;
    }

    .brand,
    .menu a {
      color: var(--muted);
      text-decoration: none;
      font-size: 1.08rem;
    }

    .menu {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .intro {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
      gap: 36px;
      margin-bottom: 36px;
      align-items: center;
    }

    .card,
    .meta-block,
    .figure {
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .card {
      padding: 0;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(3.6rem, 6.8vw, 5.8rem);
      line-height: 0.93;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.22rem;
      line-height: 1.72;
    }

    .meta {
      display: grid;
      gap: 14px;
    }

    .meta-block {
      padding: 0;
      background: transparent;
    }

    .meta-block strong {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
      font-size: 1.22rem;
      font-weight: 600;
    }

    .meta-block span {
      display: block;
      color: var(--muted);
      font-size: 1.14rem;
      line-height: 1.68;
    }

    .emotion-note {
      color: var(--ink);
      font-size: 1.28rem;
      line-height: 1.34;
      max-width: 28rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
      align-items: start;
    }

    .figure {
      overflow: visible;
    }

    .visual-stage {
      display: grid;
      place-items: center;
      min-height: 0;
      padding: 0;
      background: transparent;
    }

    .visual-stage img {
      max-width: 100%;
      max-height: 520px;
      width: auto;
      height: auto;
      display: block;
      object-fit: contain;
      border-radius: 0;
    }

    .caption {
      padding: 16px 0 8px;
      background: transparent;
    }

    .caption p {
      font-size: 1.04rem;
      line-height: 1.58;
    }

    @media (max-width: 900px) {
      .page { width: min(1080px, calc(100% - 28px)); }
      .nav { flex-direction: column; align-items: flex-start; }
      .intro { grid-template-columns: 1fr; }
      .card {
        min-height: 0;
        align-items: flex-start;
        text-align: left;
      }
      .gallery { grid-template-columns: 1fr; }
      .visual-stage {
        min-height: 0;
        padding: 0;
      }
      .visual-stage img {
        max-height: 420px;
      }
    }

    @keyframes page-fade-in {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="nav">
      <a class="brand" href="index.html">Ziyi Ren</a>
      <nav class="menu" aria-label="Main">
        <a href="index.html">Home</a>
        <a href="projects.html">Project Directory</a>
      </nav>
    </header>

    <section class="intro">
      <article class="card">
        <h1>RAID</h1>
        <p class="emotion-note">Emotions: ANTS ARE A PAIN IN THE B*TT</p>
      </article>

      <aside class="meta">
        <div class="meta-block">
          <strong>We Want To Tell</strong>
          <span>People who have an ant problem</span>
        </div>
        <div class="meta-block">
          <strong>That</strong>
          <span>RAID will kill the ants dead</span>
        </div>
        <div class="meta-block">
          <strong>Because</strong>
          <span>Ants shouldn't take over your home.</span>
        </div>
      </aside>
    </section>

    <section class="gallery">
      <figure class="figure">
        <div class="visual-stage">
          <img src="src/raid/RAID%203.png" alt="Raid visual 1">
        </div>
        <figcaption class="caption">
          <p>When the swarm takes over, RAID takes the room back.</p>
        </figcaption>
      </figure>

      <figure class="figure">
        <div class="visual-stage">
          <img src="src/raid/RAID2.png" alt="Raid visual 2">
        </div>
        <figcaption class="caption">
          <p>A kitchen confrontation scaled up into a threat.</p>
        </figcaption>
      </figure>

      <figure class="figure">
        <div class="visual-stage">
          <img src="src/raid/RAID%201.jpeg" alt="Raid visual 3">
        </div>
        <figcaption class="caption">
          <p>Instant intervention. Visible control.</p>
        </figcaption>
      </figure>
    </section>
  </main>

  <script>
    window.addEventListener('pageshow', () => {
      const page = document.querySelector('.page');
      page.style.animation = 'none';
      page.style.opacity = '1';
      page.style.transform = 'translateY(0)';
    });
  </script>
</body>
</html>
