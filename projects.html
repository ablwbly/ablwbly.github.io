<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Directory</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap');

    :root {
      --bg: #f0efeb;
      --ink: #312b25;
      --muted: #74695c;
      --line: rgba(116, 105, 92, 0.18);
      --accent: #8d7662;
      --accent-soft: rgba(141, 118, 98, 0.12);
      --machine: #8d7359;
      --machine-dark: #6f5945;
      --metal: #d8c7b3;
      --field: rgba(250, 246, 240, 0.8);
      --shadow: 0 18px 36px rgba(77, 64, 52, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(170, 152, 131, 0.12), transparent 26%),
        linear-gradient(180deg, #f6f3ed 0%, var(--bg) 100%);
      overflow-x: hidden;
    }

    .page {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 24px 0 76px;
      transition: opacity 0.42s ease;
    }

    body.is-transitioning .page {
      opacity: 0;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }

    .brand,
    .nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 1.08rem;
    }

    .hero {
      padding: 42px 0 16px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.2rem, 7vw, 5.2rem);
      line-height: 0.94;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .lead {
      margin: 14px auto 0;
      max-width: 42rem;
      color: var(--muted);
      font-size: 1.14rem;
      line-height: 1.62;
    }

    .mine-scene {
      position: relative;
      margin-top: 18px;
      min-height: 980px;
      background: transparent;
      overflow: hidden;
      isolation: isolate;
    }

    .mine-scene::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 74%, rgba(141, 118, 98, 0.08), transparent 20%),
        radial-gradient(circle at 82% 68%, rgba(141, 118, 98, 0.08), transparent 18%);
      pointer-events: none;
    }

    .scene-note {
      position: absolute;
      top: 18px;
      left: 24px;
      color: var(--accent);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transform: rotate(-2deg);
      z-index: 5;
    }

    .machine-zone {
      position: relative;
      width: min(700px, calc(100% - 80px));
      height: 246px;
      margin: 18px auto 0;
      z-index: 4;
    }

    .machine-doodle {
      position: absolute;
      top: 10px;
      left: 50%;
      width: 250px;
      height: 188px;
      transform: translateX(-50%);
      z-index: 3;
      color: var(--machine-dark);
    }

    .machine-doodle svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
      stroke: currentColor;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .machine-doodle .body-fill {
      fill: rgba(255, 251, 245, 0.72);
      stroke: none;
    }

    .machine-doodle .cheek {
      fill: rgba(141, 118, 98, 0.12);
      stroke: none;
    }

    .machine-doodle .wheel {
      fill: rgba(255, 251, 245, 0.78);
    }

    .miner {
      position: absolute;
      top: 64px;
      width: 108px;
      height: 140px;
      color: var(--accent);
    }

    .miner.left { left: 54px; }
    .miner.right { right: 54px; }

    .miner svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
      stroke: currentColor;
      stroke-width: 2.6;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .miner .body {
      transform-origin: center bottom;
      animation: miner-bob 3.2s ease-in-out infinite;
    }

    .miner.right .body { animation-delay: 0.4s; }

    .machine-zone.is-guiding .miner.right .arm-a,
    .machine-zone.is-guiding .miner.right .arm-b {
      transform-origin: center top;
      transform-box: fill-box;
      animation: crank-motion 0.62s ease-in-out infinite;
    }

    .hook-mount {
      position: absolute;
      top: 34px;
      left: 50%;
      width: 22px;
      height: 22px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: linear-gradient(180deg, #fff7ee, #ccb19b);
      box-shadow:
        0 6px 10px rgba(77, 64, 52, 0.12),
        inset 0 1px 0 rgba(255, 248, 240, 0.8);
      z-index: 6;
    }

    .hook-assembly {
      position: absolute;
      top: 44px;
      left: 50%;
      width: 0;
      height: 0;
      transform: translateX(-50%) rotate(var(--hook-angle, 0deg));
      transform-origin: top center;
      transition: transform 0.78s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 5;
    }

    .rope {
      position: absolute;
      left: 50%;
      top: 0;
      width: 3px;
      height: var(--hook-length, 0px);
      transform: translateX(-50%);
      background: linear-gradient(180deg, rgba(111, 89, 69, 0.9), rgba(111, 89, 69, 0.35));
      transition: height 0.78s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .claw {
      position: absolute;
      top: var(--hook-length, 0px);
      left: 50%;
      width: 52px;
      height: 52px;
      transform: translate(-50%, -6px);
      transition: top 0.78s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .claw svg {
      width: 100%;
      height: 100%;
      display: block;
      stroke: var(--machine-dark);
      stroke-width: 2.4;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .machine-zone.is-grabbing .claw-left {
      transform: rotate(10deg);
      transform-origin: 18px 28px;
    }

    .machine-zone.is-grabbing .claw-right {
      transform: rotate(-10deg);
      transform-origin: 34px 28px;
    }

    .field-note {
      position: absolute;
      top: 224px;
      left: 50%;
      transform: translateX(-50%) rotate(-1deg);
      color: var(--muted);
      font-size: 0.98rem;
      opacity: 0.92;
      z-index: 4;
      transition: opacity 0.22s ease;
    }

    .machine-zone.is-guiding + .field-note {
      opacity: 0;
    }

    .icon-field {
      position: relative;
      min-height: 710px;
      padding: 340px 32px 56px;
      z-index: 3;
    }

    .project-icon {
      position: absolute;
      left: var(--left);
      top: var(--top);
      width: 148px;
      transform: translate(-50%, -50%) rotate(var(--tilt, 0deg));
      transform-origin: center center;
      text-decoration: none;
      color: inherit;
      transition: transform 0.22s ease, opacity 0.22s ease;
    }

    .project-icon:hover {
      transform: translate(-50%, -50%) rotate(var(--tilt, 0deg)) scale(1.04);
    }

    .project-icon.is-hidden {
      opacity: 0;
      visibility: hidden;
    }

    .icon-shell {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
    }

    .icon-shell img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 10px 14px rgba(77, 64, 52, 0.12));
    }

    .icon-label {
      margin-top: 10px;
      text-align: center;
      color: var(--ink);
      font-size: 1.08rem;
      line-height: 1.18;
      text-wrap: balance;
    }

    .caught-icon {
      position: absolute;
      left: 50%;
      top: 10px;
      pointer-events: none;
      z-index: 6;
      transform: translate(-50%, 0) rotate(-18deg) scale(0.78);
      transform-origin: center center;
      transition: opacity 0.24s ease;
    }

    .caught-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 8px 12px rgba(77, 64, 52, 0.12));
    }

    @keyframes miner-bob {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-4px) rotate(1.5deg); }
    }

    @keyframes crank-motion {
      0%, 100% { transform: rotate(8deg); }
      50% { transform: rotate(-12deg); }
    }

    @media (max-width: 900px) {
      .page { width: min(1180px, calc(100% - 28px)); }
      .mine-scene { min-height: 1220px; }
      .machine-zone {
        width: min(560px, calc(100% - 30px));
        height: 230px;
      }
      .machine-doodle {
        width: 214px;
        height: 168px;
      }
      .miner.left { left: 12px; }
      .miner.right { right: 12px; }
      .icon-field {
        min-height: 940px;
        padding: 334px 20px 46px;
      }
      .project-icon {
        width: 132px;
      }
    }

    @media (max-width: 640px) {
      .page { width: min(1180px, calc(100% - 20px)); }
      .nav { flex-direction: column; align-items: flex-start; }
      .hero {
        padding: 34px 0 12px;
      }
      .lead {
        font-size: 1.02rem;
        line-height: 1.48;
      }
      .mine-scene { min-height: 1440px; }
      .machine-zone {
        width: min(360px, calc(100% - 18px));
        height: 216px;
      }
      .machine-doodle {
        width: 180px;
        height: 148px;
      }
      .miner {
        width: 86px;
        height: 118px;
        top: 76px;
      }
      .miner.left { left: 0; }
      .miner.right { right: 0; }
      .field-note {
        top: 206px;
        width: calc(100% - 28px);
        text-align: center;
        font-size: 0.9rem;
      }
      .icon-field {
        min-height: 1180px;
        padding: 328px 12px 36px;
      }
      .project-icon {
        width: 114px;
      }
      .icon-label {
        font-size: 0.94rem;
      }
    }
  </style>
</head>
<body>

  <script>
    const mineScene = document.getElementById('mineScene');
    const machineZone = document.getElementById('machineZone');
    const iconField = document.getElementById('iconField');
    const hookMount = document.getElementById('hookMount');
    const hookAssembly = document.getElementById('hookAssembly');
    const claw = document.getElementById('claw');
    const icons = Array.from(document.querySelectorAll('.project-icon'));
    const HOOK_MOTION_MS = 780;
    const DROP_DELAY_MS = 150;
    const CATCH_PAUSE_MS = 120;
    let navigating = false;
    let caughtIcon = null;

    function applyResponsivePositions() {
      const compact = window.innerWidth <= 640;
      const medium = window.innerWidth <= 900 && !compact;

      const mobile = [
        ['24%', '28%'],
        ['74%', '30%'],
        ['24%', '49%'],
        ['74%', '50%'],
        ['24%', '70%'],
        ['74%', '70%'],
        ['50%', '88%']
      ];

      const tablet = [
        ['18%', '33%'],
        ['50%', '36%'],
        ['82%', '31%'],
        ['24%', '60%'],
        ['52%', '63%'],
        ['80%', '58%'],
        ['46%', '84%']
      ];

      icons.forEach((icon, index) => {
        if (compact) {
          icon.style.setProperty('--left', mobile[index][0]);
          icon.style.setProperty('--top', mobile[index][1]);
        } else if (medium) {
          icon.style.setProperty('--left', tablet[index][0]);
          icon.style.setProperty('--top', tablet[index][1]);
        }
      });
    }

    function resetScene() {
      navigating = false;
      document.body.classList.remove('is-transitioning');
      machineZone.classList.remove('is-guiding', 'is-grabbing', 'is-retracting');
      hookAssembly.style.setProperty('--hook-angle', '0deg');
      hookAssembly.style.setProperty('--hook-length', '0px');
      icons.forEach((icon) => icon.classList.remove('is-hidden'));
      if (caughtIcon) {
        caughtIcon.remove();
        caughtIcon = null;
      }
    }

    function createCaughtIcon(icon) {
      const sourceImage = icon.querySelector('img');
      const imageRect = sourceImage.getBoundingClientRect();
      const clone = document.createElement('div');
      clone.className = 'caught-icon';
      clone.style.width = `${Math.max(56, imageRect.width)}px`;
      clone.style.height = `${Math.max(56, imageRect.height)}px`;
      clone.appendChild(sourceImage.cloneNode(true));
      claw.appendChild(clone);
      return clone;
    }

    function getShotMetrics(icon) {
      const sceneRect = mineScene.getBoundingClientRect();
      const mountRect = hookMount.getBoundingClientRect();
      const iconRect = icon.querySelector('.icon-shell').getBoundingClientRect();
      const mountX = mountRect.left - sceneRect.left + (mountRect.width / 2);
      const mountY = mountRect.top - sceneRect.top + (mountRect.height / 2);
      const iconX = iconRect.left - sceneRect.left + (iconRect.width / 2);
      const iconY = iconRect.top - sceneRect.top + (iconRect.height / 2);
      const deltaX = iconX - mountX;
      const deltaY = iconY - mountY;
      const hookAngle = Math.atan2(-deltaX, deltaY) * (180 / Math.PI);
      const hookLength = Math.max(0, Math.hypot(deltaX, deltaY) - 26);
      return { hookAngle, hookLength };
    }

    function fadeToPage(href) {
      document.body.classList.add('is-transitioning');
      if (caughtIcon) {
        caughtIcon.style.opacity = '0';
      }
      window.setTimeout(() => {
        window.location.href = href;
      }, 420);
    }

    function handleIconClick(event) {
      const icon = event.currentTarget;
      if (navigating) {
        event.preventDefault();
        return;
      }

      event.preventDefault();
      navigating = true;
      machineZone.classList.add('is-guiding');

      const metrics = getShotMetrics(icon);
      hookAssembly.style.setProperty('--hook-angle', `${metrics.hookAngle}deg`);

      window.setTimeout(() => {
        hookAssembly.style.setProperty('--hook-length', `${metrics.hookLength}px`);
      }, DROP_DELAY_MS);

      window.setTimeout(() => {
        machineZone.classList.add('is-grabbing');
        caughtIcon = createCaughtIcon(icon);
        icon.classList.add('is-hidden');
      }, DROP_DELAY_MS + HOOK_MOTION_MS);

      window.setTimeout(() => {
        hookAssembly.style.setProperty('--hook-angle', '0deg');
        hookAssembly.style.setProperty('--hook-length', '78px');
        machineZone.classList.remove('is-grabbing');
        machineZone.classList.add('is-retracting');
      }, DROP_DELAY_MS + HOOK_MOTION_MS + CATCH_PAUSE_MS);

      window.setTimeout(() => {
        fadeToPage(icon.href);
      }, DROP_DELAY_MS + (HOOK_MOTION_MS * 2) + CATCH_PAUSE_MS + 180);
    }

    icons.forEach((icon) => icon.addEventListener('click', handleIconClick));

    window.addEventListener('resize', applyResponsivePositions);
    window.addEventListener('pageshow', () => {
      resetScene();
      applyResponsivePositions();
    });

    applyResponsivePositions();
  </script>
</body>
