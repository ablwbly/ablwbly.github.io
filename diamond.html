<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diamond</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap');

    :root {
      --bg: #f0efeb;
      --paper: rgba(249, 246, 240, 0.94);
      --panel: #f7f3ed;
      --ink: #312b25;
      --muted: #74695c;
      --line: rgba(116, 105, 92, 0.18);
      --accent: #8d7662;
      --accent-soft: rgba(141, 118, 98, 0.12);
      --shadow: 0 18px 36px rgba(77, 64, 52, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(170, 152, 131, 0.12), transparent 26%),
        linear-gradient(180deg, #f6f3ed 0%, var(--bg) 100%);
    }

    .page {
      width: min(1080px, calc(100% - 40px));
      margin: 0 auto;
      padding: 24px 0 64px;
      opacity: 0;
      transform: translateY(14px);
      animation: page-fade-in 0.55s ease forwards;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 36px;
    }

    .brand,
    .menu a {
      color: var(--muted);
      text-decoration: none;
      font-size: 1.08rem;
    }

    .menu {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .intro {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
      gap: 36px;
      margin-bottom: 36px;
      align-items: center;
    }

    .card,
    .meta-block,
    .figure {
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .card {
      padding: 0;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.6rem, 6.8vw, 5.8rem);
      line-height: 0.93;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.22rem;
      line-height: 1.72;
    }

    .meta {
      display: grid;
      gap: 18px;
    }

    .meta-block {
      padding: 0;
      background: transparent;
    }

    .meta-block strong {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
      font-size: 1.22rem;
      font-weight: 600;
    }

    .meta-block span {
      display: block;
      color: var(--muted);
      font-size: 1.14rem;
      line-height: 1.68;
    }

    .copy-list {
      margin-top: 28px;
      color: var(--ink);
      font-size: 1.22rem;
      line-height: 1.72;
      width: fit-content;
      max-width: 100%;
      text-align: left;
    }

    .copy-list strong {
      display: block;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .copy-list p {
      color: var(--ink);
    }

    .gallery {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
      align-items: start;
    }

    .figure {
      overflow: visible;
    }

    .figure img {
      width: 100%;
      display: block;
      height: auto;
    }

    .caption {
      padding: 16px 0 8px;
      background: transparent;
    }

    .caption p {
      font-size: 1.04rem;
      line-height: 1.58;
    }

    @media (max-width: 900px) {
      .page { width: min(1080px, calc(100% - 28px)); }
      .nav { flex-direction: column; align-items: flex-start; }
      .intro { grid-template-columns: 1fr; }
      .card {
        min-height: 0;
        align-items: flex-start;
        text-align: left;
      }
      .copy-list {
        width: 100%;
        margin-left: 0;
      }
    }

    @keyframes page-fade-in {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="nav">
      <a class="brand" href="index.html">Ziyi Ren</a>
      <nav class="menu" aria-label="Main">
        <a href="index.html">Home</a>
        <a href="projects.html">Project Directory</a>
      </nav>
    </header>

    <section class="intro">
      <article class="card">
        <h1>Diamond</h1>
        <div class="copy-list">
          <strong>Copy</strong>
          <p>1. Put a galaxy on her finger.</p>
          <p>2. Physical receipt of happiness.</p>
          <p>3. A love letter from the periodic table.</p>
        </div>
      </article>

      <aside class="meta">
        <div class="meta-block">
          <strong>We Want To Tell</strong>
          <span>Men</span>
        </div>
        <div class="meta-block">
          <strong>That</strong>
          <span>Nothing says I Love You like diamonds</span>
        </div>
        <div class="meta-block">
          <strong>Because</strong>
          <span>Because Diamonds.</span>
        </div>
      </aside>
    </section>

    <section class="gallery">
      <figure class="figure">
        <img src="src/diamond/%E9%92%BB%E7%9F%B3%E6%96%87%E6%A1%881.png" alt="Diamond visual 1">
        <figcaption class="caption">
          <p>Put a galaxy on her finger.</p>
        </figcaption>
      </figure>

      <figure class="figure">
        <img src="src/diamond/%E9%92%BB%E7%9F%B3%E6%96%87%E6%A1%882.png" alt="Diamond visual 2">
        <figcaption class="caption">
          <p>Physical receipt of happiness.</p>
        </figcaption>
      </figure>

      <figure class="figure">
        <img src="src/diamond/%E9%92%BB%E7%9F%B3%E6%96%87%E6%A1%883.png" alt="Diamond visual 3">
        <figcaption class="caption">
          <p>A love letter from the periodic table.</p>
        </figcaption>
      </figure>
    </section>
  </main>

  <script>
    window.addEventListener('pageshow', () => {
      const page = document.querySelector('.page');
      page.style.animation = 'none';
      page.style.opacity = '1';
      page.style.transform = 'translateY(0)';
    });
  </script>
</body>
</html>
